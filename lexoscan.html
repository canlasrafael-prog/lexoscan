<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexoScan — Vocabulary Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a12;
    --surface: #0c1520;
    --surface2: #111d2e;
    --border: #1a2e45;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --accent3: #ff6b35;
    --text: #e0eaf5;
    --text-muted: #5a7a99;
    --glow: 0 0 20px rgba(0, 212, 255, 0.3);
    --glow2: 0 0 20px rgba(0, 255, 157, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial glow top */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(0,212,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(5, 10, 18, 0.8);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    border: 2px solid var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--glow);
    position: relative;
    overflow: hidden;
  }

  .logo-icon::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.2), transparent);
  }

  .logo-icon svg { position: relative; z-index: 1; }

  .logo-text {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: var(--glow);
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  .header-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    border: 1px solid rgba(0,255,157,0.3);
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  /* MAIN LAYOUT */
  .app-container {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    min-height: calc(100vh - 81px);
  }

  /* LEFT PANEL */
  .left-panel {
    border-right: 1px solid var(--border);
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    background: rgba(12, 21, 32, 0.6);
  }

  .panel-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-label::before {
    content: '';
    width: 20px;
    height: 1px;
    background: var(--accent);
    box-shadow: var(--glow);
  }

  /* DROP ZONE */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.05), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .drop-zone:hover::before, .drop-zone.dragover::before {
    opacity: 1;
  }

  .drop-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 14px;
    border: 2px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }

  .drop-zone:hover .drop-icon {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .drop-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
  }

  .drop-sub {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .drop-formats {
    margin-top: 12px;
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .format-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
  }

  #fileInput { display: none; }

  .file-info {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 8px;
    font-size: 13px;
  }

  .file-info.show { display: flex; }
  .file-name { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-remove { cursor: pointer; color: var(--text-muted); font-size: 18px; line-height: 1; transition: color 0.2s; }
  .file-remove:hover { color: var(--accent3); }

  /* SETTINGS */
  .setting-group { display: flex; flex-direction: column; gap: 8px; }

  .setting-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  select, .num-input input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
    cursor: pointer;
  }

  select:focus, .num-input input:focus {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .select-wrap { position: relative; }

  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    pointer-events: none;
    font-size: 12px;
  }

  .num-input {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
  }

  .num-input input {
    border: none;
    text-align: center;
    border-radius: 0;
    padding: 10px 8px;
    width: 100%;
  }

  .num-btn {
    width: 40px;
    min-width: 40px;
    height: 40px;
    background: var(--surface2);
    border: none;
    color: var(--accent);
    font-size: 18px;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .num-btn:hover { background: rgba(0,212,255,0.15); }

  /* API KEY INPUT */
  .api-input-wrap {
    position: relative;
  }

  .api-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 40px 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--accent); box-shadow: var(--glow); }

  .api-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: var(--text-muted);
    font-size: 14px;
    user-select: none;
  }

  .api-saved {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    display: none;
    align-items: center;
    gap: 5px;
    margin-top: 5px;
  }

  .api-saved.show { display: flex; }

  /* SEARCH BUTTON */
  .search-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #0099cc);
    border: none;
    border-radius: 10px;
    color: #050a12;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    margin-top: auto;
  }

  .search-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .search-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,212,255,0.4);
  }

  .search-btn:hover::before { opacity: 1; }

  .search-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .search-btn.loading {
    pointer-events: none;
  }

  /* RIGHT PANEL */
  .right-panel {
    padding: 32px;
    overflow-y: auto;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .results-title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 2px;
  }

  .scan-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  .status-dot.active {
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* WORD GRID */
  .word-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* WORD CARD */
  .word-card {
    display: grid;
    grid-template-columns: 160px 1fr auto;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--surface);
    transition: all 0.3s ease;
    animation: cardIn 0.4s ease forwards;
    opacity: 0;
    transform: translateY(10px);
  }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .word-card:hover {
    border-color: rgba(0,212,255,0.3);
    box-shadow: 0 4px 20px rgba(0,212,255,0.1);
  }

  .word-card.changing {
    animation: cardFlash 0.5s ease;
  }

  @keyframes cardFlash {
    0% { opacity: 1; }
    30% { opacity: 0.2; border-color: var(--accent); }
    100% { opacity: 1; }
  }

  /* POS SELECTOR column */
  .pos-col {
    background: var(--surface2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 10px;
    gap: 6px;
  }

  .pos-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .pos-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--accent);
    border-radius: 6px;
    padding: 5px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    width: 130px;
    outline: none;
    cursor: pointer;
    text-align: center;
    appearance: none;
  }

  .pos-select:focus { border-color: var(--accent); }

  .slot-number {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--border);
    line-height: 1;
  }

  /* WORD CONTENT column */
  .word-content {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }

  .word-display {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: var(--glow);
    letter-spacing: 1px;
    min-height: 28px;
  }

  .word-display.empty {
    color: var(--border);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 2px;
  }

  .word-pos-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(0,255,157,0.1);
    border: 1px solid rgba(0,255,157,0.3);
    color: var(--accent2);
    width: fit-content;
    min-height: 20px;
  }

  .word-definition {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    min-height: 20px;
  }

  .word-example {
    font-size: 12px;
    color: rgba(0,212,255,0.6);
    font-style: italic;
    line-height: 1.5;
    border-left: 2px solid rgba(0,212,255,0.2);
    padding-left: 10px;
    min-height: 18px;
  }

  /* CHANGE BUTTON column */
  .change-col {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    border-left: 1px solid var(--border);
  }

  .change-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .change-btn:hover:not(:disabled) {
    border-color: var(--accent3);
    color: var(--accent3);
    box-shadow: 0 0 12px rgba(255,107,53,0.2);
  }

  .change-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .change-btn svg {
    transition: transform 0.3s;
  }

  .change-btn:hover svg {
    transform: rotate(180deg);
  }

  /* LOADING STATE */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,10,18,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    backdrop-filter: blur(4px);
  }

  .loading-overlay.show { display: flex; }

  .scanner-ring {
    width: 80px;
    height: 80px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ERROR / TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--surface2);
    border: 1px solid var(--accent3);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 13px;
    color: var(--accent3);
    z-index: 200;
    display: none;
    animation: slideUp 0.3s ease;
    max-width: 360px;
  }

  .toast.show { display: block; }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .app-container { grid-template-columns: 1fr; }
    .left-panel { border-right: none; border-bottom: 1px solid var(--border); }
    .word-card { grid-template-columns: 120px 1fr auto; }
  }

  @media (max-width: 600px) {
    header { padding: 16px 20px; }
    .right-panel { padding: 20px 16px; }
    .left-panel { padding: 20px 16px; }
    .word-card { grid-template-columns: 1fr; }
    .pos-col { flex-direction: row; border-right: none; border-bottom: 1px solid var(--border); }
    .change-col { border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="3" fill="#00d4ff"/>
        <path d="M10 2 L10 5 M10 15 L10 18 M2 10 L5 10 M15 10 L18 10" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="10" cy="10" r="7" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3 2"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">LEXOSCAN</div>
      <div class="logo-sub">Vocabulary Intelligence</div>
    </div>
  </div>
  <div class="header-badge">AI-POWERED · FREE TIER</div>
</header>

<div class="app-container">

  <!-- LEFT PANEL -->
  <div class="left-panel">

    <div>
      <div class="panel-label">Upload Document</div>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="drop-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#5a7a99" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="drop-title">Drop your file here</div>
        <div class="drop-sub">or click to browse</div>
        <div class="drop-formats">
          <span class="format-tag">PDF</span>
          <span class="format-tag">TXT</span>
          <span class="format-tag">PNG</span>
          <span class="format-tag">JPG</span>
          <span class="format-tag">DOC</span>
        </div>
      </div>
      <input type="file" id="fileInput" accept=".pdf,.txt,.doc,.docx,.png,.jpg,.jpeg,.webp">
      <div class="file-info" id="fileInfo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <span class="file-name" id="fileName"></span>
        <span class="file-remove" onclick="removeFile()">×</span>
      </div>
    </div>

    <div class="setting-group">
      <div class="panel-label">Gemini API Key</div>
      <div class="api-input-wrap">
        <input type="password" class="api-input" id="apiKey" placeholder="Paste your Gemini API key here">
        <span class="api-toggle" onclick="toggleApiKey()">👁</span>
      </div>
      <div class="api-saved" id="apiSaved">✓ KEY SAVED IN BROWSER</div>
    </div>

    <div class="setting-group">
      <div class="panel-label">Grade Level</div>
      <div class="select-wrap">
        <select id="gradeLevel">
          <option value="Grade 1">Grade 1</option>
          <option value="Grade 2">Grade 2</option>
          <option value="Grade 3">Grade 3</option>
          <option value="Grade 4">Grade 4</option>
          <option value="Grade 5" selected>Grade 5</option>
          <option value="Grade 6">Grade 6</option>
          <option value="Grade 7">Grade 7</option>
          <option value="Grade 8">Grade 8</option>
          <option value="Grade 9">Grade 9</option>
          <option value="Grade 10">Grade 10</option>
          <option value="High School">High School</option>
          <option value="College">College</option>
        </select>
      </div>
    </div>

    <div class="setting-group">
      <div class="panel-label">Number of Words</div>
      <div class="num-input">
        <button class="num-btn" onclick="adjustCount(-1)">−</button>
        <input type="number" id="wordCount" value="7" min="1" max="30" oninput="updateSlots()">
        <button class="num-btn" onclick="adjustCount(1)">+</button>
      </div>
    </div>

    <button class="search-btn" id="searchBtn" onclick="startScan()">
      ⟨ INITIATE SCAN ⟩
    </button>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="results-header">
      <div class="results-title">WORD SLOTS</div>
      <div class="scan-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">READY</span>
      </div>
    </div>

    <div class="word-grid" id="wordGrid"></div>
  </div>

</div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="scanner-ring"></div>
  <div class="loading-text" id="loadingText">SCANNING DOCUMENT...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// =============================================
// CONFIGURATION — Replace with your API key
// =============================================
// You can also type it directly in the input field in the app
const DEFAULT_API_KEY = ""; // Paste your Gemini API key here if you want it pre-filled

// =============================================

let uploadedFile = null;
let currentWords = [];

// Init
window.onload = () => {
  // Load saved API key from localStorage
  const savedKey = localStorage.getItem('lexoscan_api_key');
  if (savedKey) {
    document.getElementById('apiKey').value = savedKey;
  } else if (DEFAULT_API_KEY) {
    document.getElementById('apiKey').value = DEFAULT_API_KEY;
  }

  // Auto-save API key whenever it changes
  document.getElementById('apiKey').addEventListener('input', () => {
    const val = document.getElementById('apiKey').value.trim();
    if (val) {
      localStorage.setItem('lexoscan_api_key', val);
      document.getElementById('apiSaved').classList.add('show');
    } else {
      localStorage.removeItem('lexoscan_api_key');
      document.getElementById('apiSaved').classList.remove('show');
    }
  });

  // Show saved indicator if key was already stored
  if (localStorage.getItem('lexoscan_api_key')) {
    document.getElementById('apiSaved').classList.add('show');
  }

  updateSlots();
  setupDragDrop();
};

// ---- FILE HANDLING ----
function setupDragDrop() {
  const zone = document.getElementById('dropZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });
  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });
}

function handleFile(file) {
  uploadedFile = file;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileInfo').classList.add('show');
}

function removeFile() {
  uploadedFile = null;
  document.getElementById('fileInfo').classList.remove('show');
  document.getElementById('fileInput').value = '';
}

// ---- SLOTS ----
function adjustCount(delta) {
  const input = document.getElementById('wordCount');
  let val = parseInt(input.value) + delta;
  val = Math.max(1, Math.min(30, val));
  input.value = val;
  updateSlots();
}

function updateSlots() {
  const count = Math.max(1, Math.min(30, parseInt(document.getElementById('wordCount').value) || 7));
  const grid = document.getElementById('wordGrid');
  const current = grid.children.length;

  // Add slots
  for (let i = current; i < count; i++) {
    grid.appendChild(createWordCard(i));
  }
  // Remove slots
  while (grid.children.length > count) {
    grid.removeChild(grid.lastChild);
  }

  // Sync currentWords array
  while (currentWords.length < count) currentWords.push(null);
  currentWords = currentWords.slice(0, count);
}

function createWordCard(index) {
  const card = document.createElement('div');
  card.className = 'word-card';
  card.id = `card-${index}`;
  card.style.animationDelay = `${index * 0.05}s`;

  card.innerHTML = `
    <div class="pos-col">
      <div class="slot-number">${String(index + 1).padStart(2, '0')}</div>
      <div class="pos-label">Part of Speech</div>
      <select class="pos-select" id="pos-${index}">
        <option value="Any">Any</option>
        <option value="Noun">Noun</option>
        <option value="Verb">Verb</option>
        <option value="Adjective">Adjective</option>
        <option value="Adverb">Adverb</option>
        <option value="Pronoun">Pronoun</option>
        <option value="Conjunction">Conjunction</option>
        <option value="Preposition">Preposition</option>
        <option value="Interjection">Interjection</option>
      </select>
    </div>
    <div class="word-content">
      <div class="word-display empty" id="word-${index}">— AWAITING SCAN —</div>
      <div class="word-pos-badge" id="badge-${index}"></div>
      <div class="word-definition" id="def-${index}"></div>
      <div class="word-example" id="ex-${index}"></div>
    </div>
    <div class="change-col">
      <button class="change-btn" id="changebtn-${index}" onclick="changeWord(${index})" disabled>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        CHANGE
      </button>
    </div>
  `;
  return card;
}

function fillCard(index, data) {
  const wordEl = document.getElementById(`word-${index}`);
  const badgeEl = document.getElementById(`badge-${index}`);
  const defEl = document.getElementById(`def-${index}`);
  const exEl = document.getElementById(`ex-${index}`);
  const btn = document.getElementById(`changebtn-${index}`);
  const card = document.getElementById(`card-${index}`);

  card.classList.add('changing');
  setTimeout(() => card.classList.remove('changing'), 500);

  wordEl.textContent = data.word;
  wordEl.classList.remove('empty');
  badgeEl.textContent = data.partOfSpeech || '';
  defEl.textContent = data.definition || '';
  exEl.textContent = data.example ? `"${data.example}"` : '';
  btn.disabled = false;

  currentWords[index] = data;
}

// ---- API CALL ----
async function callGemini(prompt, isImage = false, imageBase64 = null, imageMime = null) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) throw new Error('Please enter your Gemini API key.');

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

  let parts = [];
  if (isImage && imageBase64) {
    parts.push({ inlineData: { mimeType: imageMime, data: imageBase64 } });
  }
  parts.push({ text: prompt });

  const body = {
    contents: [{ parts }],
    generationConfig: { temperature: 0.4, maxOutputTokens: 4096 }
  };

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'Gemini API error');
  }

  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

// ---- FILE TO TEXT ----
async function extractText(file) {
  const type = file.type;

  if (type.startsWith('image/')) {
    // Use Gemini vision to extract text from image
    return { text: '', isImage: true, file };
  }

  if (type === 'text/plain') {
    return { text: await file.text(), isImage: false };
  }

  if (type === 'application/pdf') {
    // Extract text from PDF using FileReader
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          // Simple text extraction: convert PDF bytes to string and grab readable text
          const bytes = new Uint8Array(e.target.result);
          let text = '';
          for (let i = 0; i < bytes.length; i++) {
            const c = bytes[i];
            if (c >= 32 && c < 127) text += String.fromCharCode(c);
            else if (c === 10 || c === 13) text += ' ';
          }
          // Clean up
          text = text.replace(/[^\x20-\x7E\s]/g, ' ').replace(/\s{3,}/g, ' ').trim();
          resolve({ text: text.substring(0, 8000), isImage: false });
        } catch {
          resolve({ text: '', isImage: false });
        }
      };
      reader.readAsArrayBuffer(file);
    });
  }

  // For DOC/DOCX — try reading as text
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => resolve({ text: e.target.result?.substring(0, 8000) || '', isImage: false });
    reader.onerror = () => resolve({ text: '', isImage: false });
    reader.readAsText(file);
  });
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ---- BUILD PROMPT ----
function buildPrompt(text, gradeLevel, slots) {
  const slotDescriptions = slots.map((pos, i) =>
    `Slot ${i + 1}: ${pos === 'Any' ? 'any part of speech' : pos}`
  ).join('\n');

  return `You are a vocabulary expert helping a teacher find challenging but educational words for ${gradeLevel} students.

${text ? `Here is the source text to analyze:\n---\n${text.substring(0, 6000)}\n---\n` : ''}

Your task:
1. Find ${slots.length} vocabulary words that would be UNFAMILIAR or CHALLENGING for ${gradeLevel} students.
2. If the source text doesn't have enough uncommon words, supplement with other words appropriate for that level.
3. Respect the part of speech requirement for each slot.
4. For each word, provide: the word, its part of speech, a simple grade-appropriate definition, and a clear example sentence.

Slot requirements:
${slotDescriptions}

IMPORTANT: Return ONLY a valid JSON array, no markdown, no extra text. Format:
[
  {
    "word": "...",
    "partOfSpeech": "...",
    "definition": "...",
    "example": "..."
  }
]`;
}

// ---- MAIN SCAN ----
async function startScan() {
  if (!uploadedFile) { showToast('Please upload a file first.'); return; }

  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showToast('Please enter your Gemini API key.'); return; }

  const count = parseInt(document.getElementById('wordCount').value) || 7;
  const grade = document.getElementById('gradeLevel').value;
  const slots = Array.from({ length: count }, (_, i) => {
    const el = document.getElementById(`pos-${i}`);
    return el ? el.value : 'Any';
  });

  showLoading('EXTRACTING TEXT...');

  try {
    const extracted = await extractText(uploadedFile);
    let responseText;

    if (extracted.isImage) {
      setLoadingText('SCANNING IMAGE WITH AI...');
      const base64 = await fileToBase64(uploadedFile);
      const prompt = buildPrompt('', grade, slots) + '\n\nNote: The source is an image — first read any visible text in the image, then find vocabulary words from it (or supplement if needed).';
      responseText = await callGemini(prompt, true, base64, uploadedFile.type);
    } else {
      setLoadingText('ANALYZING VOCABULARY...');
      const prompt = buildPrompt(extracted.text, grade, slots);
      responseText = await callGemini(prompt);
    }

    // Parse JSON
    const clean = responseText.replace(/```json|```/g, '').trim();
    const words = JSON.parse(clean);

    hideLoading();

    // Fill cards
    words.forEach((w, i) => {
      if (i < count) fillCard(i, w);
    });

    setStatus('SCAN COMPLETE', true);

  } catch (err) {
    hideLoading();
    showToast('Error: ' + err.message);
    setStatus('ERROR', false);
  }
}

// ---- CHANGE WORD ----
async function changeWord(index) {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showToast('Please enter your Gemini API key.'); return; }

  const grade = document.getElementById('gradeLevel').value;
  const pos = document.getElementById(`pos-${index}`)?.value || 'Any';
  const existingWords = currentWords.filter(w => w).map(w => w.word).join(', ');

  const btn = document.getElementById(`changebtn-${index}`);
  btn.disabled = true;
  btn.textContent = '...';

  try {
    const prompt = `You are a vocabulary expert. Find ONE replacement vocabulary word for a ${grade} student.
Requirements:
- Part of speech: ${pos === 'Any' ? 'any' : pos}
- Must be DIFFERENT from these already used words: ${existingWords}
- Should be challenging but educational for ${grade} level
- Return ONLY a valid JSON object (no markdown):
{"word": "...", "partOfSpeech": "...", "definition": "...", "example": "..."}`;

    const response = await callGemini(prompt);
    const clean = response.replace(/```json|```/g, '').trim();
    const word = JSON.parse(clean);
    fillCard(index, word);
  } catch (err) {
    showToast('Could not fetch new word: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> CHANGE`;
  }
}

// ---- UI HELPERS ----
function showLoading(msg) {
  document.getElementById('loadingText').textContent = msg;
  document.getElementById('loadingOverlay').classList.add('show');
  document.getElementById('searchBtn').disabled = true;
}

function setLoadingText(msg) {
  document.getElementById('loadingText').textContent = msg;
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
  document.getElementById('searchBtn').disabled = false;
}

function setStatus(text, active) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.classList.toggle('active', active);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 4000);
}

function toggleApiKey() {
  const input = document.getElementById('apiKey');
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
